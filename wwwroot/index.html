<!DOCTYPE html>
<html lang="es-es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpeApp</title>
    <base href="/" />
    <link rel="preload" id="webassembly" />
    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="OpeApp.styles.css" rel="stylesheet" />
    <script type="importmap"></script>
    <script>
        window.isOnline = () => navigator.onLine;
        window.checkRealOnline = async () => {
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 3000);
                const r = await fetch('ping.json?t=' + Date.now(), {
                    cache: 'no-store',
                    signal: controller.signal
                });
                clearTimeout(timeoutId);
                const ct = r.headers.get('content-type') || '';
                return r.ok && ct.includes('application/json');
            } catch {
                return false;
            }
        };
    </script>
    <!-- Cloudflare Web Analytics -->
    <script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "5f8486c7ab594baabaa00998e3813619"}'></script>
    <!-- End Cloudflare Web Analytics -->
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('service-worker.js')
                    .catch(err => console.warn('SW register failed', err));
            });
        }
    </script>
</body>

</html>
