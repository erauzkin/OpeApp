name: Deploy Blazor WASM (.NET 10) - Local NAS

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: [self-hosted, synology-net10]

    steps:
    - name: Checkout código
      uses: actions/checkout@v4

    - name: Configurar .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Publicar aplicación Blazor
      run: dotnet publish -c Release -o release-output

    - name: Mover archivos a Web Station (Limpiando lo anterior salvo archivos protegidos)
      run: |
        # Definimos la carpeta del NAS mapeada en el contenedor
        TARGET_DIR="/app/output/opeapp"
        
        # Creamos la carpeta por si acaso es la primera vez
        mkdir -p "$TARGET_DIR"
        
        # 1. Limpieza selectiva usando -path y comillas dobles (apuntando a la subcarpeta)
        find "$TARGET_DIR" -mindepth 1 \
          ! -path "$TARGET_DIR/data/comun.json" \
          ! -path "$TARGET_DIR/data/especifica.json" \
          -delete
        
        # 2. Copiamos la compilación de .NET 10 dentro de su subcarpeta
        cp -RT release-output/wwwroot/ "$TARGET_DIR/"
        
        # 3. Corregimos permisos en la subcarpeta del proyecto
        find "$TARGET_DIR" -type d -exec chmod 755 {} +
        find "$TARGET_DIR" -type f -exec chmod 644 {} +