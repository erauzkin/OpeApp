name: Deploy Blazor WASM to Synology

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout código
      uses: actions/checkout@v4

    - name: Configurar .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Publicar aplicación Blazor
      run: dotnet publish -c Release -o release-output

    - name: Desplegar en Synology vía SFTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.NAS_HOST }}
        port: ${{ secrets.NAS_PORT }}
        username: ${{ secrets.NAS_USERNAME }}
        password: ${{ secrets.NAS_PASSWORD }}
        protocol: ftps
        local-dir: ./release-output/wwwroot/
        server-dir: /volume1/opeapp/
        dangerous-clean-html: true
        excludes: |
          data/comun.json
          data/especifica.json