name: Deploy Blazor WASM (.NET 10) - Local NAS

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: [self-hosted, synology-net10]

    steps:
    - name: Checkout código
      uses: actions/checkout@v4

    - name: Configurar .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Publicar aplicación Blazor
      run: dotnet publish -c Release -o release-output

    - name: Mover archivos a Web Station (Limpiando lo anterior salvo archivos protegidos)
      run: |
        # Definimos la carpeta del NAS mapeada en el contenedor
        TARGET_DIR="/app/output"
        
        # 1. Limpieza selectiva: Borramos todo EXCEPTO los dos archivos que quieres proteger
        find "$TARGET_DIR" -mindepth 1 ! -name '$TARGET_DIR/data/comun.json' ! -name '$TARGET_DIR/data/especifica.json' -delete
        
        # 2. Copiamos los nuevos archivos compilados de .NET 10 a la carpeta del NAS
        cp -r release-output/wwwroot/* "$TARGET_DIR/"
        
        # ─── AQUÍ CORREGIMOS EL ERROR 403 ───
        # Concedemos permisos de ejecución/lectura a los directorios para que Apache pueda entrar
        find "$TARGET_DIR" -type d -exec chmod 755 {} +
        
        # Concedemos permisos de lectura a todos los archivos para que sean accesibles web
        find "$TARGET_DIR" -type f -exec chmod 644 {} +